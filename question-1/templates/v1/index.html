<!DOCTYPE html>
<html>
<head>
    <title>Search Phase 1</title>
</head>
<body>
    <h1>On-Call Assistant Search (Phase 1)</h1>
    <form id="search-form">
        <input type="text" id="q" name="q" placeholder="Search...">
        <button type="submit">Search</button>
    </form>
    <div id="results"></div>

    <script>
        document.getElementById('search-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const q = document.getElementById('q').value;
            const res = await fetch(`/v1/search?q=${encodeURIComponent(q)}`);
            const data = await res.json();
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '';
            for (const r of data.results) {
                resultsDiv.innerHTML += `<div>
                    <h3><a href="/data/${r.id}.html" target="_blank" rel="noopener noreferrer">${r.title}</a> (${r.id})</h3>
                    <p>${r.snippet}</p>
                    <small>Score: ${r.score}</small>
                </div>`;
            }
        });
    </script>
</body>
</html>
